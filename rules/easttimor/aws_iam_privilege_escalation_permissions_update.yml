# Translation notes:
#   The original Athena query selected from cloudtrail_xxxxxxxxxxxx where
#   eventSource = 'iam.amazonaws.com' and eventName IN (...). The Sigma
#   equivalent uses a single selection with two keys (eventSource as a scalar
#   and eventName as a list). The ATT&CK technique IDs documented inline in
#   the upstream README become Sigma `tags`.
title: AWS IAM Privilege Escalation Through Permissions Update
id: d03097c7-ac3d-4f16-afe6-9074695282ca
status: experimental
description: |
    Detects IAM API actions that attach, detach, or modify policies on
    users, groups, or roles. These actions are commonly used by attackers
    after credential compromise to expand access for an existing principal
    or to remove explicit deny boundaries.
references:
    - https://github.com/easttimor/aws-incident-response#privilege-escalation-adding-permissions
    - https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
author: Mostafa Moradian, after easttimor
date: 2026-05-22
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098
    - attack.ta0003
    - attack.ta0004
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName:
            - AttachUserPolicy
            - DetachUserPolicy
            - AttachRolePolicy
            - DetachRolePolicy
            - PutUserPolicy
            - PutGroupPolicy
            - PutRolePolicy
            - DeleteUserPolicy
            - DeleteGroupPolicy
            - DeleteRolePolicy
            - DeleteRolePermissionsBoundary
    condition: selection
falsepositives:
    - Routine IAM administration by trusted automation accounts (filter by `userIdentity.arn`)
    - Infrastructure-as-code pipelines applying policy changes during deployment
level: high
